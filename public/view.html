<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fleek — Seller NPS Report</title>
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Montserrat:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#FFFFFF;--card:#F8F8F8;--border:#E5E5E5;--yellow:#FFD400;--orange:#F25C2A;--red:#E8453C;--green:#3DD68C;--cream:#111111;--muted:#777}
body{background:var(--bg);color:var(--cream);font-family:'Montserrat',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Topbar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:64px;background:var(--bg);border-bottom:2px solid var(--yellow);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:14px}
.brand img{height:28px;filter:brightness(0)}
.brand-divider{width:1px;height:20px;background:var(--border)}
.brand-label{font-family:'League Gothic',sans-serif;font-size:1rem;letter-spacing:4px;color:var(--yellow);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:14px}
.report-date{font-size:0.68rem;color:var(--muted);letter-spacing:1px}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.logout-btn:hover{border-color:var(--yellow);color:var(--yellow)}

/* ── Period bar ── */
.period-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-bar-label{color:var(--muted);font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-right:4px}
.period-btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.period-btn:hover{border-color:rgba(255,212,0,0.5);color:var(--cream)}
.period-btn.active{background:var(--yellow);color:#0F0F0F;border-color:var(--yellow)}

/* ── Tab bar ── */
.tab-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between}
.tab-nav{display:flex;gap:0}
.vtab{background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);padding:14px 20px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.vtab:hover{color:var(--cream)}
.vtab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
.pdf-btn{background:var(--yellow);color:#0F0F0F;border:none;padding:8px 18px;border-radius:2px;cursor:pointer;font-family:'League Gothic',sans-serif;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;transition:opacity 0.15s;white-space:nowrap}
.pdf-btn:hover{opacity:0.85}

/* ── Layout ── */
.main{max-width:1140px;margin:0 auto;padding:28px 24px 48px}
.vtab-content{display:none}.vtab-content.active{display:block}

/* ── Period cards ── */
.period-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:12px;margin-bottom:20px}
.period-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:18px 16px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.period-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.period-card:hover::after{background:rgba(255,212,0,0.35)}
.period-card.active{border-color:var(--yellow);background:rgba(255,212,0,0.04)}
.period-card.active::after{background:var(--yellow)}
.pc-period{font-size:0.62rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.pc-nps{font-family:'League Gothic',sans-serif;font-size:2.4rem;line-height:1;letter-spacing:2px}
.pc-total{font-size:0.7rem;color:var(--muted);margin-top:5px}
.pc-delta{font-size:0.68rem;font-weight:700;margin-top:5px}

/* ── NPS Hero ── */
.nps-hero{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:36px 32px;margin-bottom:20px;display:grid;grid-template-columns:220px 1fr;gap:40px;align-items:center}
.hero-score-wrap{text-align:center;border-right:1px solid var(--border);padding-right:40px}
.hero-score-label{font-size:0.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
.hero-score-value{font-family:'League Gothic',sans-serif;font-size:5.5rem;letter-spacing:4px;line-height:1}
.hero-score-health{font-family:'League Gothic',sans-serif;font-size:0.72rem;letter-spacing:3px;text-transform:uppercase;margin-top:8px;padding:4px 12px;display:inline-block;border-radius:2px}
.hero-score-meta{color:var(--muted);font-size:0.7rem;margin-top:12px}
.hero-score-trend{font-size:0.76rem;font-weight:700;margin-top:6px}
.hero-segs{display:flex;flex-direction:column;gap:16px}
.seg-row{display:flex;align-items:center;gap:14px}
.seg-label{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;min-width:92px}
.seg-track{flex:1;background:#EEEEEE;border-radius:2px;height:12px;overflow:hidden}
.seg-fill{height:100%;border-radius:2px;transition:width 0.7s ease}
.seg-pct{font-family:'League Gothic',sans-serif;font-size:1.4rem;min-width:54px;text-align:right}
.seg-count{font-size:0.7rem;color:var(--muted);min-width:66px}

/* ── Metric strip ── */
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center}
.metric-label{font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
.metric-value{font-family:'League Gothic',sans-serif;font-size:2.8rem;letter-spacing:2px;line-height:1}
.metric-sub{color:var(--muted);font-size:0.7rem;margin-top:6px;font-family:'JetBrains Mono',monospace}

/* ── Charts ── */
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:24px}
.chart-title{font-family:'League Gothic',sans-serif;font-size:0.76rem;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:18px}

/* ── Score dist ── */
.dist-group{margin-bottom:14px}
.dist-group-label{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-score{font-family:'JetBrains Mono',monospace;font-size:0.76rem;font-weight:700;min-width:16px;text-align:center}
.bar-track{flex:1;background:#EEEEEE;border-radius:2px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.bar-cnt{font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:700;min-width:26px;text-align:right}

/* ── Section cards ── */
.section-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:24px;margin-bottom:16px}
.section-title{font-family:'League Gothic',sans-serif;font-size:0.76rem;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);font-weight:700}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:0.82rem;vertical-align:middle}
tr:hover td{background:rgba(0,0,0,0.02)}
tr:last-child td{border-bottom:none}
.nps-bar-cell{display:flex;align-items:center;gap:8px}
.nps-bar-mini{flex:1;max-width:80px;height:4px;background:#EEEEEE;border-radius:2px;overflow:hidden}
.nps-bar-mini-fill{height:100%;border-radius:2px}

/* ── Comments ── */
.comment-row{padding:16px 0;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:flex-start}
.comment-row:last-child{border-bottom:none}
.score-pill{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:4px;font-family:'League Gothic',sans-serif;font-size:1.2rem;font-weight:700;flex-shrink:0}
.score-pill.P{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.25)}
.score-pill.S{background:rgba(242,92,42,0.1);color:var(--orange);border:1px solid rgba(242,92,42,0.2)}
.score-pill.D{background:rgba(232,69,60,0.1);color:var(--red);border:1px solid rgba(232,69,60,0.2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:0.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge.P{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.2)}
.badge.S{background:rgba(242,92,42,0.1);color:var(--orange);border:1px solid rgba(242,92,42,0.2)}
.badge.D{background:rgba(232,69,60,0.1);color:var(--red);border:1px solid rgba(232,69,60,0.2)}
.comments-divider{font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px}

/* ── Satisfaction ── */
.sat-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.sat-area-bar{margin-bottom:12px}
.sat-bar-track{display:flex;height:10px;border-radius:2px;overflow:hidden;margin:5px 0}
.sat-legend{display:flex;gap:14px;font-size:0.7rem;color:var(--muted)}
.aspects-wrap{display:flex;flex-wrap:wrap;gap:8px}
.aspect-chip{background:#F0F0F0;border:1px solid var(--border);border-radius:2px;padding:6px 12px;display:flex;align-items:center;gap:8px;font-size:0.8rem}
.aspect-count{background:var(--yellow);color:#0F0F0F;font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:2px}

/* ── Smart Summary ── */
.summary-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:24px;margin-bottom:16px}
.summary-title{font-family:'League Gothic',sans-serif;font-size:0.76rem;letter-spacing:3px;color:var(--yellow);text-transform:uppercase;margin-bottom:14px}

/* ── Footer ── */
.footer{margin-top:32px;padding:18px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-left{color:var(--muted);font-size:0.68rem;line-height:1.6}
.footer-right{display:flex;align-items:center;gap:10px}
.footer-right img{height:18px;filter:brightness(0);opacity:0.5}

/* ── Loading ── */
.loading{text-align:center;padding:80px;color:var(--muted)}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .nps-hero{grid-template-columns:1fr}
  .hero-score-wrap{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:24px}
  .metric-strip{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .sat-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .topbar,.tab-bar{padding:0 14px}
  .main{padding:14px 12px 40px}
  .metric-strip{grid-template-columns:1fr 1fr}
  .period-cards{grid-template-columns:1fr 1fr}
  .vtab{padding:12px 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="https://www.joinfleek.com/_next/static/media/Logo.6ba37d95.webp" alt="Fleek"/>
    <div class="brand-divider"></div>
    <span class="brand-label">Seller NPS Report</span>
  </div>
  <div class="topbar-right">
    <span class="report-date" id="topbarDate"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="period-bar" id="periodBar">
  <span class="period-bar-label">Period:</span>
</div>

<div class="tab-bar">
  <div class="tab-nav">
    <button class="vtab active" onclick="showVTab('overview')">Overview</button>
    <button class="vtab" onclick="showVTab('satisfaction')">Satisfaction</button>
    <button class="vtab" onclick="showVTab('summary')">Smart Summary</button>
    <button class="vtab" onclick="showVTab('area')">Area NPS</button>
  </div>
  <button class="pdf-btn" onclick="exportPDF()">⬇ Download Report PDF</button>
</div>

<div class="main">

  <!-- OVERVIEW TAB -->
  <div class="vtab-content active" id="vtab-overview">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div style="font-family:'League Gothic',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--yellow);text-transform:uppercase;margin-top:4px">Loading Report...</div>
    </div>
  </div>

  <!-- SATISFACTION TAB -->
  <div class="vtab-content" id="vtab-satisfaction">
    <div style="padding:60px;text-align:center;color:var(--muted)">Loading...</div>
  </div>

  <!-- SMART SUMMARY TAB -->
  <div class="vtab-content" id="vtab-summary">
    <div style="padding:60px;text-align:center;color:var(--muted)">Loading...</div>
  </div>

  <!-- AREA NPS TAB -->
  <div class="vtab-content" id="vtab-area">
    <div style="padding:60px;text-align:center;color:var(--muted)">Loading...</div>
  </div>

</div>

<script>
// ── Auth ─────────────────────────────────────────────────────────────────
if (!sessionStorage.getItem('nps_role')) { window.location.href = '/'; }
function logout() { sessionStorage.removeItem('nps_role'); sessionStorage.removeItem('nps_user'); window.location.href = '/'; }

document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

// ── State ────────────────────────────────────────────────────────────────
let allData = [];
let activePeriod = 'all';
let activeTab = 'overview';

// ── Data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('/api/data?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allData = json.responses || [];
  } catch(e) {
    try {
      const raw = await fetch('https://raw.githubusercontent.com/basilhzaidi/fleek-nps-dashboard/main/public/data.json?t=' + Date.now());
      const json = await raw.json();
      allData = json.responses || [];
    } catch(e2) { allData = []; }
  }
  renderAll();
}

// ── Helpers ───────────────────────────────────────────────────────────────
function calcNPS(entries) {
  const total = entries.length;
  if (!total) return { total:0, pro:0, pass:0, det:0, nps:0 };
  const scored = entries.filter(e => e.score !== null && e.score !== undefined && Number.isFinite(e.score) && e.score >= 0 && e.score <= 10);
  const n = scored.length;
  if (!n) return { total, pro:0, pass:0, det:0, nps:0 };
  const pro  = scored.filter(e => e.score >= 9).length;
  const pass = scored.filter(e => e.score >= 7 && e.score <= 8).length;
  const det  = scored.filter(e => e.score <= 6).length;
  return { total, pro, pass, det, nps: Math.round((pro-det)/n*100) };
}
function npsColor(nps) { return nps >= 20 ? 'var(--green)' : nps >= 0 ? 'var(--orange)' : 'var(--red)'; }
function npsHex(nps)   { return nps >= 20 ? '#3DD68C'      : nps >= 0 ? '#F25C2A'        : '#E8453C'; }
function getPeriods() {
  const order={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  return [...new Set(allData.map(e=>e.period))].filter(Boolean).sort((a,b)=>{
    const[am,ay]=a.split(' '),[bm,by]=b.split(' ');
    return(parseInt(ay)-parseInt(by))||((order[am]||0)-(order[bm]||0));
  });
}
function periodData() { return allData.filter(e=>!e.areaTag); }
function filtered() {
  const base = periodData();
  return activePeriod==='all' ? base : base.filter(e=>e.period===activePeriod);
}
function areaData() { return allData.filter(e=>e.areaTag); }

// ── Period bar ────────────────────────────────────────────────────────────
function renderPeriodBar() {
  const periods = getPeriods();
  document.getElementById('periodBar').innerHTML =
    `<span class="period-bar-label">Period:</span>
     <button class="period-btn ${activePeriod==='all'?'active':''}" onclick="setPeriod('all')">All Time</button>
     ${periods.map(p=>`<button class="period-btn ${activePeriod===p?'active':''}" onclick="setPeriod('${p}')">${p}</button>`).join('')}`;
}

function setPeriod(p) { activePeriod = p; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); }
function showVTab(t) {
  activeTab = t;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.vtab-content').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.vtab[onclick*="${t}"]`).classList.add('active');
  document.getElementById('vtab-'+t).classList.add('active');
  renderActiveTab();
}
function renderAll() { renderPeriodBar(); renderActiveTab(); }
function renderActiveTab() {
  if (activeTab==='overview') renderOverview();
  else if (activeTab==='satisfaction') renderSatisfaction();
  else if (activeTab==='summary') renderSummary();
  else if (activeTab==='area') renderAreaNPS();
}

// ── OVERVIEW TAB ─────────────────────────────────────────────────────────
function renderOverview() {
  const data = filtered();
  const periods = getPeriods();
  const { nps, total, pro, pass, det } = calcNPS(data);
  const proP = total ? Math.round(pro/total*100) : 0;
  const passP = total ? Math.round(pass/total*100) : 0;
  const detP = total ? Math.round(det/total*100) : 0;
  const health = nps>=50?{l:'EXCELLENT',bg:'rgba(61,214,140,0.12)',c:'var(--green)',b:'rgba(61,214,140,0.3)'}
               : nps>=20?{l:'GOOD',bg:'rgba(61,214,140,0.08)',c:'var(--green)',b:'rgba(61,214,140,0.2)'}
               : nps>=0 ?{l:'NEEDS WORK',bg:'rgba(242,92,42,0.1)',c:'var(--orange)',b:'rgba(242,92,42,0.25)'}
                        :{l:'CRITICAL',bg:'rgba(232,69,60,0.1)',c:'var(--red)',b:'rgba(232,69,60,0.25)'};

  let trendHTML = '';
  if (activePeriod !== 'all') {
    const idx = periods.indexOf(activePeriod);
    if (idx > 0) {
      const pNPS = calcNPS(allData.filter(e=>e.period===periods[idx-1])).nps;
      const d = nps - pNPS;
      trendHTML = `<div class="hero-score-trend" style="color:${d>=0?'var(--green)':'var(--red)'}">
        ${d>=0?'▲':'▼'} ${d>0?'+':''}${d} vs ${periods[idx-1]}</div>`;
    }
  }

  // Period cards
  const pCards = periods.map((p,i) => {
    const pn = calcNPS(allData.filter(e=>e.period===p));
    const prev = i>0 ? calcNPS(allData.filter(e=>e.period===periods[i-1])).nps : null;
    const d = prev!==null ? pn.nps-prev : null;
    return `<div class="period-card ${activePeriod===p?'active':''}" onclick="setPeriod('${p}')">
      <div class="pc-period">${p}</div>
      <div class="pc-nps" style="color:${npsColor(pn.nps)}">${pn.nps>0?'+':''}${pn.nps}</div>
      <div class="pc-total">${pn.total} responses</div>
      ${d!==null?`<div class="pc-delta" style="color:${d>=0?'var(--green)':'var(--red)'}">${d>=0?'▲':'▼'} ${d>0?'+':''}${d} vs prev</div>`:''}
    </div>`;
  }).join('');

  // Score dist
  const scored = data.filter(e=>Number.isFinite(e.score)&&e.score>=0&&e.score<=10);
  const distHTML = [{l:'Detractors (0–6)',s:[0,1,2,3,4,5,6],c:'var(--red)'},
                    {l:'Passives (7–8)',s:[7,8],c:'var(--orange)'},
                    {l:'Promoters (9–10)',s:[9,10],c:'var(--green)'}].map(g=>{
    const gc = g.s.reduce((a,s)=>a+scored.filter(e=>e.score===s).length,0);
    return `<div class="dist-group">
      <div class="dist-group-label" style="color:${g.c}">${g.l} <span style="color:var(--muted);font-weight:400">(${gc})</span></div>
      ${g.s.map(s=>{const c=scored.filter(e=>e.score===s).length,pct=scored.length?Math.round(c/scored.length*100):0;
        return `<div class="bar-row"><span class="bar-score" style="color:${g.c}">${s}</span>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${g.c}"></div></div>
          <span class="bar-cnt" style="color:${g.c}">${c}</span></div>`;}).join('')}
    </div>`;
  }).join('');

  // Dept chart data (horizontal bar)

<meta charset="UTF-8"/>
<title>Fleek Seller NPS Report — ${periodLabel}</title>
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{background:#FFFFFF;color:#111111;font-family:'Montserrat',sans-serif;font-size:13px;line-height:1.6}
.navbar{background:#FFFFFF;border-bottom:2px solid #FFD400;padding:0 48px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:12px}
.nav-logo img{height:28px;filter:brightness(0);display:block}
.nav-logo .divider{width:1px;height:18px;background:#E5E5E5}
.nav-logo .label{font-family:'League Gothic',sans-serif;font-size:14px;letter-spacing:4px;color:#FFD400;text-transform:uppercase}
.nav-right{text-align:right}
.nav-right .rpt-title{font-family:'League Gothic',sans-serif;font-size:13px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:#111111}
.nav-right .rpt-sub{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-top:2px}
.hero{background:#F8F8F8;border-bottom:1px solid #E5E5E5;padding:56px 48px 44px}
.hero-eyebrow{font-family:'League Gothic',sans-serif;font-size:10px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:#FFD400;margin-bottom:16px}
.hero-h1{font-family:'League Gothic',sans-serif;font-size:72px;font-weight:400;line-height:0.95;text-transform:uppercase;color:#111111;margin-bottom:20px;letter-spacing:2px}
.hero-h1 .accent{color:#FFD400}
.hero-desc{font-size:13px;color:#666;max-width:400px;line-height:1.7;margin-bottom:40px}
.kpi-row{display:flex;gap:0;border-top:1px solid #E5E5E5;padding-top:32px;flex-wrap:wrap;gap:0}
.kpi-item{padding:0 36px 0 0;border-right:1px solid #E5E5E5;margin-right:36px;flex-shrink:0}
.kpi-item:last-child{border-right:none;margin-right:0}
.kpi-num{font-family:'League Gothic',sans-serif;font-size:52px;font-weight:400;line-height:1;margin-bottom:5px}
.kpi-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#888;font-weight:700}
.section{padding:40px 48px;border-bottom:1px solid #E5E5E5}
.section:last-child{border-bottom:none}
.sec-eye{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#FFD400;margin-bottom:6px;padding-left:12px;border-left:3px solid #FFD400}
.sec-h{font-family:'League Gothic',sans-serif;font-size:28px;font-weight:400;color:#111111;text-transform:uppercase;letter-spacing:1px;margin-bottom:24px}
.trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:4px}
table{width:100%;border-collapse:collapse}
thead th{text-align:left;padding:9px 14px;border-bottom:1px solid #E5E5E5;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#333;font-weight:700}
tbody td{padding:10px 14px;border-bottom:1px solid #E5E5E5;font-size:12px;color:#111111}
tbody tr:last-child td{border-bottom:none}
.footer{padding:20px 48px;border-top:1px solid #E5E5E5;display:flex;justify-content:space-between;align-items:center}
.footer-l{color:#888;font-size:10px;line-height:1.6}
.footer-r{display:flex;align-items:center;gap:10px}
.footer-r img{height:18px;filter:brightness(0);opacity:0.5}
@media print{@page{margin:0;size:A4}body{font-size:11px}.hero{padding:40px 36px 32px}.section{padding:28px 36px}.footer,.navbar{padding-left:36px;padding-right:36px}}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <img src="${LOGO}" alt="Fleek" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <span style="display:none;font-family:'League Gothic',sans-serif;font-size:22px;letter-spacing:3px;color:#FFD400">FLEEK</span>
    <div class="divider"></div>
    <span class="label">NPS Report</span>
  </div>
  <div class="nav-right">
    <div class="rpt-title">Seller NPS Report — ${periodLabel}</div>
    <div class="rpt-sub">Generated ${now} · Internal &amp; Confidential</div>
  </div>
</div>

<div class="hero">
  <div class="hero-eyebrow">Fleek Seller Experience · ${periodLabel}</div>
  <div class="hero-h1">Seller<br/><span class="accent">NPS</span><br/>Report</div>
  <div class="hero-desc">Net Promoter Score analysis across ${total} seller responses. Period: ${periodLabel}.</div>
  <div class="kpi-row">
    <div class="kpi-item"><div class="kpi-num" style="color:${health.c}">${nps>0?'+':''}${nps}</div><div class="kpi-label">NPS Score · ${health.l}</div></div>
    <div class="kpi-item"><div class="kpi-num" style="color:#111111">${total}</div><div class="kpi-label">Total Responses</div></div>
    <div class="kpi-item"><div class="kpi-num" style="color:#3DD68C">${proP}%</div><div class="kpi-label">Promoters (9–10)</div></div>
    <div class="kpi-item"><div class="kpi-num" style="color:#E8453C">${detP}%</div><div class="kpi-label">Detractors (0–6)</div></div>
  </div>
</div>

<div class="section">
  <div class="sec-eye">Part 1 · Historical Trend</div>
  <div class="sec-h">NPS by Period</div>
  <div class="trend-grid">${trendCards}</div>
</div>

${deptRows?`<div class="section">
  <div class="sec-eye">Part 2 · Department Breakdown</div>
  <div class="sec-h">NPS by Department</div>
  <table><thead><tr><th>Department</th><th style="text-align:center">Responses</th><th>NPS</th><th>Promoters</th><th>Detractors</th></tr></thead><tbody>${deptRows}</tbody></table>
</div>`:''}

${geoRows?`<div class="section">
  <div class="sec-eye">Part 3 · Geography Breakdown</div>
  <div class="sec-h">NPS by Zone</div>
  <table><thead><tr><th>Zone</th><th style="text-align:center">Responses</th><th>NPS</th><th>Promoters</th><th>Detractors</th></tr></thead><tbody>${geoRows}</tbody></table>
</div>`:''}

${satSection?`<div class="section"><div class="sec-eye">Part 4 · Satisfaction</div><div class="sec-h">Satisfaction by Area</div>${satSection}</div>`:''}
${summarySection?`<div class="section"><div class="sec-eye">Part 4 · Analysis</div><div class="sec-h">Top Issues</div>${summarySection}</div>`:''}

${detComs.length||proComs.length?`<div class="section">
  <div class="sec-eye">Part ${satSection||summarySection?5:4} · Seller Voices</div>
  <div class="sec-h">Feedback Highlights</div>
  ${detComs.length?`<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#E8453C;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #E5E5E5">⚠ Detractor Voices</div>${detComs.map(e=>mkPdfC(e,'D')).join('')}`:''}
  ${proComs.length?`<div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#3DD68C;font-weight:700;margin-top:16px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #E5E5E5">✓ Promoter Voices</div>${proComs.map(e=>mkPdfC(e,'P')).join('')}`:''}
</div>`:''}

<div class="footer">
  <div class="footer-l">
    <div style="font-weight:700;color:#555;margin-bottom:2px">Fleek Seller Experience — Internal Report — Confidential</div>
    <div>${now} · fleek-nps-dashboard.vercel.app</div>
  </div>
  <div class="footer-r">
    <span style="font-size:9px;color:#888;letter-spacing:1px">POWERED BY</span>
    <img src="${LOGO}" alt="Fleek" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"/>
    <span style="display:none;font-family:'League Gothic',sans-serif;font-size:16px;letter-spacing:2px;color:#FFD400">FLEEK</span>
  </div>
</div>

<script>window.onload=function(){window.print();}<\/script>
</body>
</html>`;

  const w = window.open('', '_blank', 'width=1000,height=800');
  if (!w) { alert('Please allow popups for this site to export PDF.'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
}

// ── Init ─────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
