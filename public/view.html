<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fleek — Seller NPS Report</title>
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Montserrat:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F0F0F;--card:#141414;--border:#2a2a2a;--yellow:#FFD400;--orange:#F25C2A;--red:#E8453C;--green:#3DD68C;--cream:#F6F1E7;--muted:#888}
body{background:var(--bg);color:var(--cream);font-family:'Montserrat',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Topbar ── */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:0 32px;height:64px;background:#0F0F0F;border-bottom:2px solid var(--yellow);position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:14px}
.brand img{height:28px;filter:brightness(0) invert(1)}
.brand-divider{width:1px;height:20px;background:var(--border)}
.brand-label{font-family:'League Gothic',sans-serif;font-size:1rem;letter-spacing:4px;color:var(--yellow);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:16px}
.report-date{font-size:0.7rem;color:var(--muted);letter-spacing:1px}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:2px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.logout-btn:hover{border-color:var(--yellow);color:var(--yellow)}

/* ── Period bar ── */
.period-bar{background:#111;border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.period-bar-label{color:var(--muted);font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-right:4px}
.period-btn{padding:6px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:2px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.period-btn:hover{border-color:rgba(255,212,0,0.5);color:var(--cream)}
.period-btn.active{background:var(--yellow);color:#0F0F0F;border-color:var(--yellow)}

/* ── Layout ── */
.main{max-width:1140px;margin:0 auto;padding:28px 24px 48px}

/* ── NPS Hero ── */
.nps-hero{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:36px 32px;margin-bottom:20px;display:grid;grid-template-columns:220px 1fr;gap:40px;align-items:center}
.hero-score-wrap{text-align:center;border-right:1px solid var(--border);padding-right:40px}
.hero-score-label{font-size:0.62rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px}
.hero-score-value{font-family:'League Gothic',sans-serif;font-size:5.5rem;letter-spacing:4px;line-height:1}
.hero-score-health{font-family:'League Gothic',sans-serif;font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;margin-top:8px;padding:3px 12px;display:inline-block;border-radius:2px}
.hero-score-meta{color:var(--muted);font-size:0.72rem;margin-top:12px;letter-spacing:0.5px}
.hero-score-trend{font-size:0.78rem;font-weight:700;margin-top:6px}
.hero-segs{display:flex;flex-direction:column;gap:16px}
.seg-row{display:flex;align-items:center;gap:14px}
.seg-label{font-size:0.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;min-width:96px}
.seg-track{flex:1;background:#1e1e1e;border-radius:2px;height:12px;overflow:hidden}
.seg-fill{height:100%;border-radius:2px;transition:width 0.7s ease}
.seg-pct{font-family:'League Gothic',sans-serif;font-size:1.4rem;min-width:56px;text-align:right}
.seg-count{font-size:0.72rem;color:var(--muted);min-width:68px}

/* ── Period cards ── */
.period-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.period-card{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:18px 16px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.period-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);transition:background 0.15s}
.period-card:hover::after{background:rgba(255,212,0,0.4)}
.period-card.active{border-color:var(--yellow);background:rgba(255,212,0,0.04)}
.period-card.active::after{background:var(--yellow)}
.pc-period{font-size:0.65rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:8px}
.pc-nps{font-family:'League Gothic',sans-serif;font-size:2.4rem;line-height:1;letter-spacing:2px}
.pc-total{font-size:0.72rem;color:var(--muted);margin-top:5px}
.pc-delta{font-size:0.7rem;font-weight:700;margin-top:5px;display:flex;align-items:center;gap:4px}

/* ── Metric strip ── */
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center}
.metric-label{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
.metric-value{font-family:'League Gothic',sans-serif;font-size:2.8rem;letter-spacing:2px;line-height:1}
.metric-sub{color:var(--muted);font-size:0.72rem;margin-top:6px;font-family:'JetBrains Mono',monospace}

/* ── Charts ── */
.charts-row{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:20px}
.chart-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:24px}
.chart-title{font-family:'League Gothic',sans-serif;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:18px}

/* ── Score dist bars ── */
.dist-group{margin-bottom:14px}
.dist-group-label{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-score{font-family:'JetBrains Mono',monospace;font-size:0.78rem;font-weight:700;min-width:18px;text-align:center}
.bar-track{flex:1;background:#1e1e1e;border-radius:2px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease}
.bar-cnt{font-family:'JetBrains Mono',monospace;font-size:0.72rem;font-weight:700;min-width:28px;text-align:right}

/* ── Tables ── */
.section-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:4px;padding:24px;margin-bottom:16px}
.section-title{font-family:'League Gothic',sans-serif;font-size:0.78rem;letter-spacing:3px;text-transform:uppercase;color:var(--yellow);margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;border-bottom:1px solid var(--border);font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);font-weight:700}
td{padding:10px 12px;border-bottom:1px solid #1c1c1c;font-size:0.83rem;vertical-align:middle}
tr:hover td{background:rgba(255,212,0,0.02)}
tr:last-child td{border-bottom:none}
.nps-bar-cell{display:flex;align-items:center;gap:8px}
.nps-bar-mini{flex:1;max-width:80px;height:4px;background:#1e1e1e;border-radius:2px;overflow:hidden}
.nps-bar-mini-fill{height:100%;border-radius:2px}

/* ── Comments ── */
.comment-row{padding:16px 0;border-bottom:1px solid #1c1c1c;display:flex;gap:14px;align-items:flex-start}
.comment-row:last-child{border-bottom:none}
.score-pill{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:4px;font-family:'League Gothic',sans-serif;font-size:1.2rem;font-weight:700;flex-shrink:0;letter-spacing:1px}
.score-pill.P{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.25)}
.score-pill.S{background:rgba(242,92,42,0.1);color:var(--orange);border:1px solid rgba(242,92,42,0.2)}
.score-pill.D{background:rgba(232,69,60,0.1);color:var(--red);border:1px solid rgba(232,69,60,0.2)}
.comment-meta{font-size:0.75rem;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.comment-seller{font-weight:700;color:var(--cream)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:2px;font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.badge.P{background:rgba(61,214,140,0.12);color:var(--green);border:1px solid rgba(61,214,140,0.2)}
.badge.S{background:rgba(242,92,42,0.1);color:var(--orange);border:1px solid rgba(242,92,42,0.2)}
.badge.D{background:rgba(232,69,60,0.1);color:var(--red);border:1px solid rgba(232,69,60,0.2)}
.comment-text{font-size:0.84rem;color:var(--cream);line-height:1.6}
.comment-issue{font-size:0.76rem;color:var(--muted);margin-top:4px;line-height:1.4}

/* ── Comments divider ── */
.comments-divider{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;color:var(--muted);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-top:4px;margin-bottom:4px}

/* ── Footer ── */
.footer{margin-top:32px;padding:18px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-left{color:var(--muted);font-size:0.7rem;line-height:1.6}
.footer-right{display:flex;align-items:center;gap:12px}
.footer-right img{height:20px;filter:brightness(0) invert(1);opacity:0.4}

/* ── Loading ── */
.loading{text-align:center;padding:80px;color:var(--muted)}
.loading-spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Responsive ── */
@media(max-width:900px){
  .nps-hero{grid-template-columns:1fr}
  .hero-score-wrap{border-right:none;border-bottom:1px solid var(--border);padding-right:0;padding-bottom:24px}
  .metric-strip{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
}
@media(max-width:600px){
  .topbar{padding:0 16px}
  .main{padding:16px 12px 40px}
  .nps-hero{padding:24px 16px}
  .metric-strip{grid-template-columns:1fr 1fr}
  .period-cards{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="https://www.joinfleek.com/_next/static/media/Logo.6ba37d95.webp" alt="Fleek"/>
    <div class="brand-divider"></div>
    <span class="brand-label">Seller NPS Report</span>
  </div>
  <div class="topbar-right">
    <span class="report-date" id="topbarDate"></span>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="period-bar" id="periodBar">
  <span class="period-bar-label">View period:</span>
</div>

<div class="main" id="mainContent">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div style="font-family:'League Gothic',sans-serif;font-size:0.9rem;letter-spacing:3px;color:var(--yellow);text-transform:uppercase;margin-top:4px">Loading Report...</div>
  </div>
</div>

<script>
if (!sessionStorage.getItem('nps_role')) { window.location.href = '/'; }
function logout() { sessionStorage.removeItem('nps_role'); sessionStorage.removeItem('nps_user'); window.location.href = '/'; }

document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

let allData = [];
let activePeriod = 'all';

async function loadData() {
  try {
    const res = await fetch('/api/data?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allData = json.responses || [];
  } catch(e) {
    try {
      const raw = await fetch('https://raw.githubusercontent.com/basilhzaidi/fleek-nps-dashboard/main/public/data.json?t=' + Date.now());
      const json = await raw.json();
      allData = json.responses || [];
    } catch(e2) { allData = []; }
  }
  render();
}

function calcNPS(entries) {
  const total = entries.length;
  if (!total) return { total: 0, pro: 0, pass: 0, det: 0, nps: 0 };
  const scored = entries.filter(e => e.score !== null && e.score !== undefined && Number.isFinite(e.score) && e.score >= 0 && e.score <= 10);
  const n = scored.length;
  if (!n) return { total, pro: 0, pass: 0, det: 0, nps: 0 };
  const pro  = scored.filter(e => e.score >= 9).length;
  const pass = scored.filter(e => e.score >= 7 && e.score <= 8).length;
  const det  = scored.filter(e => e.score <= 6).length;
  return { total, pro, pass, det, nps: Math.round((pro - det) / n * 100) };
}

function npsColor(nps) {
  return nps >= 20 ? 'var(--green)' : nps >= 0 ? 'var(--orange)' : 'var(--red)';
}

function getPeriods() {
  const order = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  return [...new Set(allData.map(e => e.period))].filter(Boolean).sort((a,b) => {
    const [am,ay]=a.split(' '), [bm,by]=b.split(' ');
    return (parseInt(ay)-parseInt(by))||((order[am]||0)-(order[bm]||0));
  });
}

function render() {
  const periods = getPeriods();
  const filtered = activePeriod === 'all' ? allData : allData.filter(e => e.period === activePeriod);
  const { nps, total, pro, pass, det } = calcNPS(filtered);

  // Period bar
  const bar = document.getElementById('periodBar');
  bar.innerHTML = `<span class="period-bar-label">View period:</span>
    <button class="period-btn ${activePeriod==='all'?'active':''}" onclick="setPeriod('all')">All Time</button>
    ${periods.map(p=>`<button class="period-btn ${activePeriod===p?'active':''}" onclick="setPeriod('${p}')">${p}</button>`).join('')}`;

  // Health
  const health = nps >= 50 ? {label:'EXCELLENT',bg:'rgba(61,214,140,0.12)',color:'var(--green)',border:'rgba(61,214,140,0.3)'}
               : nps >= 20 ? {label:'GOOD',bg:'rgba(61,214,140,0.08)',color:'var(--green)',border:'rgba(61,214,140,0.2)'}
               : nps >= 0  ? {label:'NEEDS WORK',bg:'rgba(242,92,42,0.1)',color:'var(--orange)',border:'rgba(242,92,42,0.25)'}
                           : {label:'CRITICAL',bg:'rgba(232,69,60,0.1)',color:'var(--red)',border:'rgba(232,69,60,0.25)'};

  // Trend vs prev period
  let trendHTML = '';
  if (activePeriod !== 'all') {
    const idx = periods.indexOf(activePeriod);
    if (idx > 0) {
      const prevNPS = calcNPS(allData.filter(e => e.period === periods[idx-1])).nps;
      const delta = nps - prevNPS;
      const c = delta >= 0 ? 'var(--green)' : 'var(--red)';
      trendHTML = `<div class="hero-score-trend" style="color:${c}">${delta >= 0 ? '▲' : '▼'} ${delta > 0 ? '+' : ''}${delta} vs ${periods[idx-1]}</div>`;
    }
  }

  const proP  = total ? Math.round(pro/total*100)  : 0;
  const passP = total ? Math.round(pass/total*100) : 0;
  const detP  = total ? Math.round(det/total*100)  : 0;

  // Period cards
  const periodCardsHTML = periods.map((p,i) => {
    const pd = allData.filter(e => e.period === p);
    const pn = calcNPS(pd);
    const prev = i > 0 ? calcNPS(allData.filter(e => e.period === periods[i-1])).nps : null;
    const delta = prev !== null ? pn.nps - prev : null;
    const c = npsColor(pn.nps);
    const deltaEl = delta !== null
      ? `<div class="pc-delta" style="color:${delta>=0?'var(--green)':'var(--red)'}">
           ${delta>=0?'▲':'▼'} ${delta>0?'+':''}${delta} vs prev
         </div>` : '';
    return `<div class="period-card ${activePeriod===p?'active':''}" onclick="setPeriod('${p}')">
      <div class="pc-period">${p}</div>
      <div class="pc-nps" style="color:${c}">${pn.nps>0?'+':''}${pn.nps}</div>
      <div class="pc-total">${pn.total} responses</div>
      ${deltaEl}
    </div>`;
  }).join('');

  // Score distribution grouped
  const scored = filtered.filter(e => Number.isFinite(e.score) && e.score >= 0 && e.score <= 10);
  const distHTML = [
    {label:'Detractors (0–6)', scores:[0,1,2,3,4,5,6], color:'var(--red)'},
    {label:'Passives (7–8)',   scores:[7,8],           color:'var(--orange)'},
    {label:'Promoters (9–10)',scores:[9,10],           color:'var(--green)'}
  ].map(g => {
    const groupCnt = g.scores.reduce((a,s)=>a+scored.filter(e=>e.score===s).length,0);
    const bars = g.scores.map(s => {
      const cnt = scored.filter(e=>e.score===s).length;
      const pct = scored.length ? Math.round(cnt/scored.length*100) : 0;
      return `<div class="bar-row">
        <span class="bar-score" style="color:${g.color}">${s}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${g.color}"></div></div>
        <span class="bar-cnt" style="color:${g.color}">${cnt}</span>
      </div>`;
    }).join('');
    return `<div class="dist-group">
      <div class="dist-group-label" style="color:${g.color}">${g.label} <span style="color:var(--muted);font-weight:400">(${groupCnt})</span></div>
      ${bars}
    </div>`;
  }).join('');

  // Department rows
  const depts = ['Seller Support','Quality Check','Payments','Shipping & Logistics','Vendor App','Sales & Visibility'];
  const deptRows = depts.map(d => {
    const dd = filtered.filter(e => e.department === d);
    if (!dd.length) return '';
    const dn = calcNPS(dd);
    const c = npsColor(dn.nps);
    const barW = Math.min(100, Math.abs(dn.nps));
    return `<tr>
      <td style="font-weight:600">${d}</td>
      <td style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${dn.total}</td>
      <td>
        <div class="nps-bar-cell">
          <span style="font-family:'League Gothic',sans-serif;font-size:1.3rem;color:${c};min-width:42px">${dn.nps>0?'+':''}${dn.nps}</span>
          <div class="nps-bar-mini"><div class="nps-bar-mini-fill" style="width:${barW}%;background:${c}"></div></div>
        </div>
      </td>
      <td style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${Math.round(dd.filter(e=>e.score>=9).length/dn.total*100)}%</td>
      <td style="color:var(--red);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${Math.round(dd.filter(e=>e.score<=6).length/dn.total*100)}%</td>
    </tr>`;
  }).filter(Boolean).join('');

  // Geography rows
  const zones = ['PK Zone','PK Non-Zone','India','ROW'];
  const geoFlags = {'PK Zone':'🇵🇰','PK Non-Zone':'🇵🇰','India':'🇮🇳','ROW':'🌍'};
  const geoRows = zones.map(z => {
    const zd = filtered.filter(e => e.geography === z);
    if (!zd.length) return '';
    const zn = calcNPS(zd);
    const c = npsColor(zn.nps);
    const barW = Math.min(100, Math.abs(zn.nps));
    return `<tr>
      <td style="font-weight:600">${geoFlags[z]} ${z}</td>
      <td style="color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${zn.total}</td>
      <td>
        <div class="nps-bar-cell">
          <span style="font-family:'League Gothic',sans-serif;font-size:1.3rem;color:${c};min-width:42px">${zn.nps>0?'+':''}${zn.nps}</span>
          <div class="nps-bar-mini"><div class="nps-bar-mini-fill" style="width:${barW}%;background:${c}"></div></div>
        </div>
      </td>
      <td style="color:var(--green);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${Math.round(zd.filter(e=>e.score>=9).length/zn.total*100)}%</td>
      <td style="color:var(--red);font-family:'JetBrains Mono',monospace;font-size:0.78rem">${Math.round(zd.filter(e=>e.score<=6).length/zn.total*100)}%</td>
    </tr>`;
  }).filter(Boolean).join('');

  // Comments — detractors first, then promoters
  const withComments = filtered.filter(e => e.comment && e.comment.trim().length > 8 && Number.isFinite(e.score));
  const detComments = withComments.filter(e => e.score <= 6).slice(0,5);
  const proComments = withComments.filter(e => e.score >= 9).slice(0,4);

  const makeComment = e => {
    const cat = e.score >= 9 ? 'P' : e.score >= 7 ? 'S' : 'D';
    const catLabel = e.score >= 9 ? 'Promoter' : e.score >= 7 ? 'Passive' : 'Detractor';
    const name = e.storeHandle || e.seller || 'Unknown Seller';
    const emailEl = e.email ? `<span style="color:var(--muted);font-size:0.7rem">${e.email}</span>` : '';
    const issueEl = e.biggestIssues ? `<div class="comment-issue">⚠ ${e.biggestIssues}</div>` : (e.mainIssue && e.mainIssue !== 'None' ? `<div class="comment-issue">Issue: ${e.mainIssue}</div>` : '');
    return `<div class="comment-row">
      <span class="score-pill ${cat}">${e.score}</span>
      <div style="flex:1;min-width:0">
        <div class="comment-meta">
          <span class="comment-seller">${name}</span>
          <span class="badge ${cat}">${catLabel}</span>
          ${emailEl}
          <span style="color:var(--muted);font-size:0.7rem;margin-left:auto">${e.period}</span>
        </div>
        <div class="comment-text">${e.comment}</div>
        ${issueEl}
      </div>
    </div>`;
  };

  const commentsHTML = [
    detComments.length ? `<div class="comments-divider" style="color:var(--red)">⚠ Detractor Voices — Churn Risk (${detComments.length})</div>${detComments.map(makeComment).join('')}` : '',
    proComments.length ? `<div class="comments-divider" style="color:var(--green);margin-top:8px">✓ Promoter Voices — What's Working (${proComments.length})</div>${proComments.map(makeComment).join('')}` : ''
  ].filter(Boolean).join('');

  const now = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'long',year:'numeric'});

  document.getElementById('mainContent').innerHTML = `

    <!-- Period comparison cards -->
    <div class="period-cards">${periodCardsHTML}</div>

    <!-- NPS Hero -->
    <div class="nps-hero">
      <div class="hero-score-wrap">
        <div class="hero-score-label">Net Promoter Score</div>
        <div class="hero-score-value" style="color:${npsColor(nps)}">${nps>0?'+':''}${nps}</div>
        <div class="hero-score-health" style="background:${health.bg};color:${health.color};border:1px solid ${health.border}">${health.label}</div>
        ${trendHTML}
        <div class="hero-score-meta">${total} responses · ${activePeriod==='all'?'All Time':activePeriod}</div>
      </div>
      <div class="hero-segs">
        <div class="seg-row">
          <span class="seg-label" style="color:var(--green)">Promoters</span>
          <div class="seg-track"><div class="seg-fill" style="width:${proP}%;background:var(--green)"></div></div>
          <span class="seg-pct" style="color:var(--green)">${proP}%</span>
          <span class="seg-count">${pro} sellers</span>
        </div>
        <div class="seg-row">
          <span class="seg-label" style="color:var(--orange)">Passives</span>
          <div class="seg-track"><div class="seg-fill" style="width:${passP}%;background:var(--orange)"></div></div>
          <span class="seg-pct" style="color:var(--orange)">${passP}%</span>
          <span class="seg-count">${pass} sellers</span>
        </div>
        <div class="seg-row">
          <span class="seg-label" style="color:var(--red)">Detractors</span>
          <div class="seg-track"><div class="seg-fill" style="width:${detP}%;background:var(--red)"></div></div>
          <span class="seg-pct" style="color:var(--red)">${detP}%</span>
          <span class="seg-count">${det} sellers</span>
        </div>
        <div style="margin-top:8px;padding-top:12px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div style="font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Formula</div>
          <div></div>
          <div style="font-size:0.62rem;letter-spacing:1px;text-transform:uppercase;color:var(--muted)">Scale</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--cream)">(Pro − Det) ÷ Total</div>
          <div></div>
          <div style="font-size:0.72rem;color:var(--muted)">−100 to +100</div>
        </div>
      </div>
    </div>

    <!-- Metric strip -->
    <div class="metric-strip">
      <div class="metric" style="border-top:3px solid var(--yellow)">
        <div class="metric-label">NPS Score</div>
        <div class="metric-value" style="color:${npsColor(nps)}">${nps>0?'+':''}${nps}</div>
        <div class="metric-sub">${health.label}</div>
      </div>
      <div class="metric" style="border-top:3px solid var(--green)">
        <div class="metric-label">Promoters (9–10)</div>
        <div class="metric-value" style="color:var(--green)">${proP}%</div>
        <div class="metric-sub">${pro} of ${total}</div>
      </div>
      <div class="metric" style="border-top:3px solid var(--orange)">
        <div class="metric-label">Passives (7–8)</div>
        <div class="metric-value" style="color:var(--orange)">${passP}%</div>
        <div class="metric-sub">${pass} of ${total}</div>
      </div>
      <div class="metric" style="border-top:3px solid var(--red)">
        <div class="metric-label">Detractors (0–6)</div>
        <div class="metric-value" style="color:var(--red)">${detP}%</div>
        <div class="metric-sub">${det} of ${total}</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">NPS Trend Over Time</div>
        <canvas id="trendChart" height="180"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Score Distribution</div>
        ${distHTML}
      </div>
    </div>

    <!-- Donut + Tables -->
    <div style="display:grid;grid-template-columns:260px 1fr;gap:16px;margin-bottom:16px">
      <div class="chart-card" style="border-left:3px solid var(--yellow)">
        <div class="chart-title">Segment Breakdown</div>
        <canvas id="donutChart" height="180"></canvas>
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="section-card" style="margin-bottom:0">
          <div class="section-title">By Department</div>
          ${deptRows ? `<table><thead><tr><th>Department</th><th>Responses</th><th>NPS</th><th>Promoters</th><th>Detractors</th></tr></thead><tbody>${deptRows}</tbody></table>` : '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">No data for this period.</div>'}
        </div>
        <div class="section-card" style="margin-bottom:0">
          <div class="section-title">By Geography</div>
          ${geoRows ? `<table><thead><tr><th>Zone</th><th>Responses</th><th>NPS</th><th>Promoters</th><th>Detractors</th></tr></thead><tbody>${geoRows}</tbody></table>` : '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">No data for this period.</div>'}
        </div>
      </div>
    </div>

    <!-- Comments -->
    ${commentsHTML ? `<div class="section-card">
      <div class="section-title">Seller Feedback</div>
      ${commentsHTML}
    </div>` : ''}

    <!-- Footer -->
    <div class="footer">
      <div class="footer-left">
        <div style="font-weight:700;color:var(--cream);margin-bottom:2px">Fleek Seller Experience — Internal NPS Report</div>
        <div>Generated ${now} · ${total} responses · ${activePeriod==='all'?'All Time':activePeriod} · Confidential</div>
      </div>
      <div class="footer-right">
        <span style="font-size:0.68rem;color:var(--muted);letter-spacing:1px">POWERED BY</span>
        <img src="https://www.joinfleek.com/_next/static/media/Logo.6ba37d95.webp" alt="Fleek"/>
      </div>
    </div>
  `;

  // ── Trend chart (all periods, always) ──
  const trendPeriods = getPeriods();
  const trendStats = trendPeriods.map(p => ({ period: p, nps: calcNPS(allData.filter(e=>e.period===p)).nps }));
  const trendCtx = document.getElementById('trendChart')?.getContext('2d');
  if (trendCtx) {
    if (window._trendChart) window._trendChart.destroy();
    window._trendChart = new Chart(trendCtx, {
      type: 'line',
      data: {
        labels: trendStats.map(p=>p.period),
        datasets: [{
          label: 'NPS', data: trendStats.map(p=>p.nps),
          borderColor: '#FFD400', backgroundColor: 'rgba(255,212,0,0.07)',
          borderWidth: 2.5, pointBackgroundColor: '#FFD400', pointRadius: 6,
          pointHoverRadius: 8, tension: 0.3, fill: true
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
          annotation: {
            annotations: {
              zeroLine: {
                type: 'line', yMin: 0, yMax: 0,
                borderColor: 'rgba(255,212,0,0.35)', borderWidth: 1.5, borderDash: [5,5],
                label: { display: true, content: 'TARGET (0)', color: '#FFD400',
                  backgroundColor: 'rgba(255,212,0,0.06)',
                  font: { family: 'Montserrat', size: 9, weight: '700' },
                  position: 'end', padding: {x:6,y:3} }
              }
            }
          }
        },
        scales: {
          x: { grid:{color:'#1a1a1a'}, ticks:{color:'#888',font:{family:'Montserrat',size:10}} },
          y: { grid:{color:'#1a1a1a'}, ticks:{color:'#888',font:{family:'Montserrat',size:10}} }
        }
      }
    });
  }

  // ── Donut chart ──
  const dCtx = document.getElementById('donutChart')?.getContext('2d');
  if (dCtx && total > 0) {
    if (window._donutChart) window._donutChart.destroy();
    window._donutChart = new Chart(dCtx, {
      type: 'doughnut',
      data: {
        labels: ['Promoters','Passives','Detractors'],
        datasets: [{ data:[pro,pass,det], backgroundColor:['#3DD68C','#F25C2A','#E8453C'], borderWidth:0, hoverOffset:8 }]
      },
      options: {
        cutout: '68%',
        plugins: {
          legend: { position:'bottom', labels:{ color:'#888', padding:14, font:{family:'Montserrat',size:10} } },
          tooltip: { callbacks:{ label: c => ` ${c.label}: ${c.raw} (${Math.round(c.raw/total*100)}%)` } }
        }
      }
    });
  }
}

function setPeriod(p) {
  activePeriod = p;
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
}

loadData();
</script>
</body>
</html>
